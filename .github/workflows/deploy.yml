name: Deploy to GitHub Pages

# ⚠️ 선행조건: 저장소 Settings > Pages > Source 를 "GitHub Actions" 로 설정해야 함.
#    (안 하면 actions/deploy-pages 가 실패한다.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한(중복 실행 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Firebase config (Secrets 에 등록). 웹키는 비밀 아니지만 일관 관리.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # PIN (Secrets 에 등록). 클라 게이트지만 코드 평문은 금지.
          VITE_TEAM_PIN: ${{ secrets.VITE_TEAM_PIN }}
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
          VITE_ARCHIVED: ${{ vars.VITE_ARCHIVED }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
