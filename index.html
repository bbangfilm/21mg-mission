<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#16151D" />

    <!-- PWA 아이콘 / 매니페스트 (상대경로 — GitHub Pages 하위경로에서도 동작) -->
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="21MG" />

    <!-- 링크 공유형(비공개 성격) — 검색엔진 색인 차단 -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="21MG 국내선교 대시보드 — 2026 더행복한교회 국내단기선교 · 충남 부여 홍산은혜교회 · 8.14~16" />
    <title>21MG 국내선교 · 마을 나눔 잔치</title>

    <!-- 카톡/메신저 공유 미리보기 — 스크레이퍼는 JS를 실행하지 않으므로 정적 HTML 필수, og:image는 절대 URL -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="21MG 국내선교 · 마을 나눔 잔치" />
    <meta property="og:description" content="2026 더행복한교회 국내단기선교 · 충남 부여 홍산은혜교회 · 8.14–16" />
    <meta property="og:image" content="https://bbangfilm.github.io/21mg-mission/img/hero.jpg" />
    <meta property="og:url" content="https://bbangfilm.github.io/21mg-mission/" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- LCP(히어로 사진) 선로딩 — JS 번들 파싱을 기다리지 않고 즉시 요청 -->
    <link rel="preload" as="image" href="img/hero.jpg" fetchpriority="high" />

    <!-- 폰트: 본문 Pretendard / 제목 Paperlogy (둘 다 무료·상업이용 OK, jsDelivr) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
